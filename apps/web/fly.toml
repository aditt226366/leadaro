app = 'leadaro-onjwyg'
primary_region = 'nrt'

[build]
  dockerfile = 'Dockerfile'

  [build.args]
    API_BASE_URL = 'https://leadaro-yztmaa.fly.dev'
    NEXT_PUBLIC_API_URL = 'https://leadaro-yztmaa.fly.dev'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
