# fly.toml for leadaro-web (the Next.js dashboard, apps/web).
#
# NOTE: the API's fly.toml lives at the repo root (app = 'leadaro-yztmaa').
# This is a SEPARATE Fly app for the frontend. When launching, point Fly at
# this config: `fly launch --config apps/web/fly.toml --dockerfile apps/web/Dockerfile`
# (or set Working directory = apps/web in the dashboard).
#
# CRITICAL: NEXT_PUBLIC_API_URL is baked into the browser bundle at BUILD time,
# so it must be a build ARG, not a runtime [env] var. [build.args] below is what
# actually makes the deployed dashboard talk to the live API instead of
# localhost:8000. Update both values if the API's URL ever changes, then rebuild.

app = 'leadaro-web'
primary_region = 'bom'

[build]
  dockerfile = 'Dockerfile'

  [build.args]
    NEXT_PUBLIC_API_URL = 'https://leadaro-yztmaa.fly.dev'
    API_BASE_URL = 'https://leadaro-yztmaa.fly.dev'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
